# MPR121 -- unified sensor registry record (USR-0a).
# Schema/spec: docs/architecture/unified-sensor-registry-usr0-usr1-spec.md  (parent: unified-sensor-registry.md)
# Spine record: identity + asset pins + facet POINTERS (referenced) + net-new INLINE facets.
# Referenced-facet validation-state is PROJECTED read-through by backend/sensors/registry.py -- never stored here.
schema_version: sensor-registry-0
sensor_type: MPR121

identity:
  part_number: MPR121
  vendor: NXP Semiconductors
  wire_token: MPR121
  class: capacitive_touch
  adoption_status: active
  bus_default: { board: C, relay: uart_relay }
  successor: null

assets:                                  # versioned PINS -- object_key/sha256/retrieved deferred (SEM-1 'archived' idiom)
  datasheet:     { asset_id: ds-mpr121,  rev: "TODO", object_key: null, sha256: null, retrieved: null }
  cad_footprint: { asset_id: fp-mpr121,  version: "TODO", object_key: null, sha256: null, retrieved: null }
  model_3d:      { asset_id: m3d-mpr121, version: "TODO", object_key: null, sha256: null, retrieved: null }

facets:
  # --- Board-C relay: not yet in SEM-1/specs (the #50 catalog covered the 14 mux sensors).
  # --- semantics/measurement_specs/etc. OMITTED (not dangling-referenced); cataloguing is a follow-up. ---
  capability_mapping: { ref: "shared/schemas/intent_catalog.yaml" }   # DERIVED reverse-index (kind: derived, state: None in USR-1)
  # --- net-new INLINE facets (validation stored here; the registry is their source of truth) ---
  electrical:
    bus: i2c
    i2c_addresses: []                    # USR-3: confirm vs datasheet pinout (R1 -- resolution, not transcription)
    logic_level_v: 3.3
    relay: uart_relay
    validation: { status: pending, evidence_tier: E0, source: null, owner: embedded-sme,
                  needs: "USR-3: placement conflict -- inventory CSV lists I2C CH6 on Board A; record_schema.md relays MPR121 off-mux from Board C; embedded-SME to resolve (R1)" }
  mechanical:
    footprint_ref: { asset: cad_footprint }
    dimensions_mm: null
    validation: { status: pending, evidence_tier: E0, source: null, owner: pcb,
                  needs: "datasheet mechanical drawing (assets.datasheet rev)" }
