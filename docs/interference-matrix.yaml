# Interference matrix v1 (seeded from physics/datasheets; MEASURED pairwise at H4).
# Consumed by the AI scheduler: avoid masking interactions; state flags ride every record.
# rule verbs: mutex | tdm | stagger | gate(<state>) | flag(<name>) | zoning | cal | material_exclusion | light_tight_cavity | dedicated_aperture | spread_spectrum | shield | keepout
# enforcement_tier per rule: 'firmware' (reflex, sub-100ms) | 'edge' (active-sensing policy) | 'factory'/'mech'/'material' (design-time)
# Ships downstream via the ingest package, referenced by the device profile (single-sourced; firmware/edge LOAD it, never hardcode).
pairs:
  # 1 optical crosstalk
  - {src: UV_LED_365,      victims: [TCS3448, AS7331, MAX30102, AS7058, camera], effect: optical_saturation, rule: tdm}
  - {src: WHITE_NIR_LED,   victims: [TCS3448, AS7331, VL53L8CH, camera],         effect: optical_bias,       rule: tdm}
  - {src: VL53L8CH_940nm,  victims: [MAX30102, AS7058, TCS3448, camera],         effect: ir_crosstalk,       rule: tdm}
  - {src: PPG_LEDS,        victims: [TCS3448, VL53L8CH, camera],                 effect: optical_crosstalk,  rule: tdm}
  # 2 thermal
  - {src: BMV080_selfheat, victims: [BME688, SGP41, MLX90642],                   effect: thermal_drift,      rule: [zoning, flag(motors_active)]}
  - {src: N657_WIFI_CHG_heat, victims: [BME688, SGP41, MLX90642],               effect: thermal_drift,      rule: [zoning, cal]}
  # 3 chemical
  - {src: SILICONE_OUTGAS, victims: [BME688, SGP41], effect: siloxane_poisoning, rule: material_exclusion, note: no silicone/siloxane near air path; bake-out}
  # 4 magnetic
  - {src: CURRENT_LOOPS_LED_CHG_FAN, victims: [MMC5983MA, TMAG5273], effect: dc_field, rule: [zoning, cal]}
  - {src: MMC_SETRESET,    victims: [TMAG5273], effect: pulse_field, rule: stagger}
  - {src: FERROUS_TARGET,  victims: [MMC5983MA, TMAG5273], effect: soft_iron, rule: cal}
  - {src: DOCK_MAGNET,     victims: [MMC5983MA, TMAG5273], effect: dc_field, rule: gate(docked)}
  - {src: HAPTIC_LRA_MAGNET, victims: [MMC5983MA], effect: dc_field, rule: [zoning, mutex]}
  # 5 RF desense
  - {src: WIFI_TX,         victims: [MIA_M10Q, ADS131M04, A121], effect: rf_desense, rule: [gate(gnss_rawx), flag(wifi_active)]}
  - {src: BUCK_USB_MIPI_CLOCKS, victims: [MIA_M10Q], effect: rf_desense, rule: [spread_spectrum, shield, keepout]}
  # 6 vibration
  - {src: FAN_BLOWER,      victims: [BNO086, ADS131M04_piezo, BG51], effect: vibration, rule: flag(motors_active)}
  - {src: HAPTIC_LRA,      victims: [BNO086, ADS131M04_piezo],       effect: vibration, rule: mutex}
  # 7 switching noise
  - {src: BQ25620_CHARGING, victims: [AS7058_ECG, ADS131M04, MMC5983MA, IQS7222A], effect: switching_noise, rule: [gate(charging), flag(charging)]}
  # 8 light into radiation
  - {src: AMBIENT_EMITTER_LIGHT, victims: [BG51], effect: photocurrent, rule: light_tight_cavity}
  # 9 PM vs mesh
  - {src: LINT_MESH,       victims: [BMV080], effect: pm_attenuation, rule: [dedicated_aperture, cal], note: pore passes PM2.5 blocks lint}
activation_classes:
  always_ambient: [BME688, SGP41, BNO086, MMC5983MA, TMAG5273, BG51, sentinel_touch]
  triggered:      [MAX30102, AS7058, IQS7222A_read, A121_presence, BMV080_duty]
  intent_driven:  [MLX90642_highfps, VL53L8CH, TCS3448, AS7331, camera, GNSS_cont, WIFI_bulk]
  gated_off_default: [UV_LED_365, WHITE_NIR_LED, FAN_BLOWER, HAPTIC_LRA]
state_flags: [motors_active, haptic_active, wifi_active, charging, docked, leds_active, uv_active]

# --- downstream routing (interrogator consumes; hardware is the single source) ---
enforcement_routing:
  firmware_reflex:   # real-time, deterministic — MUST be firmware
    verbs: [tdm, mutex, stagger, gate]
    examples: [UV_LED_365->TCS3448 tdm, HAPTIC_LRA->BNO086 mutex, MMC_SETRESET->TMAG5273 stagger, WIFI_TX->MIA_M10Q gate(gnss_rawx)]
  edge_policy:       # active-sensing agent — scheduling + confidence weighting
    verbs: [flag, zoning-aware scheduling, cal-aware weighting]
  design_time:       # not runtime — HW/materials/factory own these
    verbs: [material_exclusion, light_tight_cavity, dedicated_aperture, spread_spectrum, shield, keepout, zoning, cal]
consumers:
  - {who: interrogator_firmware, loads: [firmware_reflex rules, state_flags emit], via: device_profile_ref}
  - {who: interrogator_edge_policy, loads: [edge_policy rules, matrix for active-sensing], via: device_profile_ref}
# state-flag SCHEMA DELTA owned by interrogator (ADR-0001 record contract):
#   existing (prototype): motors_active, wifi_active, leds_active, valve_active
#   NEW for v1 (we specify, they add): charging, docked, haptic_active, uv_active
