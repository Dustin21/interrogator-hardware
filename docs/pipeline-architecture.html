<rect width="1040" height="560" fill="#0f1419"/>
<text x="24" y="34" fill="#fff" font-size="19" font-weight="bold">Device architecture — two domains, gated sensor power, raw streams</text>
<rect x="24" y="60" width="380" height="210" rx="12" fill="#13202b" stroke="#0F766E" stroke-width="1.6"/>
<text x="40" y="84" fill="#7fd1c0" font-size="13" font-weight="bold">SENTINEL DOMAIN · always-on (µA–mA)</text>
<text x="40" y="106" fill="#e8e6e3" font-size="12">BL54L15 (nRF54L15, pre-certified BLE)</text>
<text x="40" y="126" fill="#9aa5b1" font-size="11">touch wake (IQS7222A) · BG51 radiation counts · fuel gauge</text>
<text x="40" y="143" fill="#9aa5b1" font-size="11">glow ring + haptics · RTC · secure boot + device identity</text>
<text x="40" y="160" fill="#9aa5b1" font-size="11">BLE control plane to phone · POWER SEQUENCER for all domains</text>
<rect x="40" y="180" width="330" height="70" rx="8" fill="#1d2833"/>
<text x="52" y="200" fill="#e8b84a" font-size="11" font-weight="bold">per-domain load switches ("AI decides what runs")</text>
<text x="52" y="218" fill="#9aa5b1" font-size="11">OPTICAL · AIR(+fan) · CONTACT · RADAR · GNSS · WIFI</text>
<text x="52" y="236" fill="#9aa5b1" font-size="11">ambient = sentinel + duty-cycled N657 → 19.8 mA</text>
<rect x="440" y="60" width="380" height="210" rx="12" fill="#13202b" stroke="#B45309" stroke-width="1.6"/>
<text x="456" y="84" fill="#e8b84a" font-size="13" font-weight="bold">APPLICATION DOMAIN · burst (wake on intent/trigger)</text>
<text x="456" y="106" fill="#e8e6e3" font-size="12">STM32N657 · M55 800MHz + NPU 600 GOPS + octal NOR</text>
<text x="456" y="126" fill="#9aa5b1" font-size="11">SPI+DMA+INT: VL53L8CH · BNO086 · ADS131M04</text>
<text x="456" y="143" fill="#9aa5b1" font-size="11">I²C-A: MLX90642 · MAX30102 · AS7058&#160;&#160;·&#160;&#160;I²C-B: BME688 · SGP41</text>
<text x="456" y="160" fill="#9aa5b1" font-size="11">· BMV080 · TCS3448 · AS7331 · MMC5983 · TMAG5273 (I3C-ready)</text>
<text x="456" y="177" fill="#9aa5b1" font-size="11">A121 radar (SPI) · MIPI-CSI camera (DNP) · USB-HS</text>
<text x="456" y="194" fill="#9aa5b1" font-size="11">GNSS UART + PPS → input-capture (hw timestamps, all sensors)</text>
<text x="456" y="211" fill="#9aa5b1" font-size="11">on-device AI headroom · deep-dive = 434 mA</text>
<rect x="856" y="60" width="160" height="210" rx="12" fill="#13202b" stroke="#4F46E5" stroke-width="1.6"/>
<text x="872" y="84" fill="#a5b4fc" font-size="13" font-weight="bold">BULK RADIO</text>
<text x="872" y="106" fill="#e8e6e3" font-size="12">ESP32-C6-MINI-1</text>
<text x="872" y="124" fill="#9aa5b1" font-size="11">SDIO · 53 Mbps</text>
<text x="872" y="141" fill="#9aa5b1" font-size="11">hard-gated off</text>
<text x="872" y="158" fill="#9aa5b1" font-size="11">in ambient</text>
<rect x="24" y="300" width="500" height="110" rx="12" fill="#171e26" stroke="#253039"/>
<text x="40" y="324" fill="#fff" font-size="12" font-weight="bold">POWER: 1200 mAh 1S → USB-C PD · BQ25620 ~1C fast charge · BQ27427 gauge</text>
<text x="40" y="344" fill="#9aa5b1" font-size="11">TPS62840 60nA sentinel rail · TPS62823 core · TLV62568 1V8 · BQ29700 protect</text>
<text x="40" y="362" fill="#9aa5b1" font-size="11">ambient ~61 h · continuous interrogation ~2.8 h · shunts on every domain (measured at H4)</text>
<text x="40" y="392" fill="#7fd1c0" font-size="11">interference-matrix.yaml → scheduler avoids masking interactions (emitters vs receivers, fan vs IMU, WiFi vs analog)</text>
<rect x="556" y="300" width="460" height="110" rx="12" fill="#171e26" stroke="#253039"/>
<text x="572" y="324" fill="#fff" font-size="12" font-weight="bold">DATA PATH (contract preserved → interrogator adapts)</text>
<text x="572" y="344" fill="#9aa5b1" font-size="11">raw + processed streams (ADR-0014) · binary IDL target + text debug</text>
<text x="572" y="362" fill="#9aa5b1" font-size="11">BLE = control/ambient telemetry · Wi-Fi = deep-dive bulk (WebRTC-class) → phone app</text>
<text x="572" y="380" fill="#9aa5b1" font-size="11">→ interrogator backend stacks on top: fusion · twin · intent agent · alerts</text>
